<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>math - Page Viewer</title>
<style>
  :root {
    --red: #c8102e;
    --red-dark: #9e0c24;
    --bg: #f7f7f7;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    height: 64px;
    background: #fff;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .brand img {
    height: 36px;
    width: auto;
    display: block;
  }

  .logo-pill {
    background: var(--red);
    color: #fff;
    font-weight: 700;
    font-size: 20px;
    line-height: 1;
    padding: 8px 12px;
    border-radius: 2px;
  }

  .brand-sub {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 700;
  }

  .back-link {
    font-size: 13px;
    font-weight: 700;
    color: var(--red);
    text-decoration: none;
  }

  .back-link:hover { text-decoration: underline; }

  .layout {
    display: grid;
    grid-template-columns: 220px minmax(0, 1fr);
    height: calc(100vh - 64px);
  }

  .sidebar {
    border-right: 1px solid var(--line);
    background: #fff;
    padding: 12px;
    overflow-y: auto;
    min-height: 0;
  }

  .sidebar h3 {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .page-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .page-list button {
    width: 100%;
    text-align: left;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    color: #374151;
  }

  .page-list button.active {
    border-color: rgba(200,16,46,.35);
    background: rgba(200,16,46,.06);
    color: var(--red);
    font-weight: 700;
  }

  .main {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }

  .viewer-head {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .viewer-title {
    font-weight: 700;
    font-size: 15px;
  }

  .viewer-sub {
    color: var(--muted);
    font-size: 12px;
  }

  .page-label {
    font-size: 13px;
    font-weight: 700;
  }

  .viewer-canvas-wrap {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px;
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
  }

  #pageImage {
    max-width: 100%;
    max-height: 100%;
    height: auto;
    border: 1px solid #d1d5db;
    box-shadow: 0 8px 28px rgba(0,0,0,.08);
    display: none;
  }

  .status {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 16px;
  }

  .qa-panel {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    display: grid;
    gap: 8px;
  }

  .qa-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .qa-title {
    font-size: 13px;
    font-weight: 700;
  }

  .qa-context {
    font-size: 12px;
    color: var(--muted);
  }

  .qa-fields {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .qa-item {
    display: grid;
    gap: 4px;
  }

  .qa-item span {
    font-size: 12px;
    color: #374151;
    font-weight: 700;
  }

  .qa-item input {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 9px;
    font-size: 13px;
    outline: none;
  }

  .qa-item input:focus {
    border-color: rgba(200,16,46,.5);
    box-shadow: 0 0 0 3px rgba(200,16,46,.12);
  }

  .controls {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .btn {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    background: #fff;
  }

  .btn:hover { background: #f9fafb; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  .btn.primary {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  .btn.check {
    background: #065f46;
    border-color: #065f46;
    color: #fff;
  }

  .btn.check:hover {
    background: #064e3b;
    border-color: #064e3b;
  }

  .btn.primary:hover { background: var(--red-dark); border-color: var(--red-dark); }

  @media (max-width: 860px) {
    body { overflow: auto; }
    .layout { grid-template-columns: 1fr; height: auto; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
    .page-list { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .main { min-height: auto; }
    .viewer-canvas-wrap { min-height: 55vh; flex: none; }
  }

  @media (max-width: 560px) {
    .topbar { height: 58px; }
    .brand-sub { font-size: 10px; letter-spacing: 1px; }
    .main { padding: 10px; }
    .qa-fields { grid-template-columns: 1fr; }
    .controls { flex-wrap: wrap; }
    .controls .btn { width: 100%; }
    .page-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
</style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <img src="popular-logo25.png" alt="POPULAR">
      <div class="brand-sub">STUDY PASS</div>
    </a>
    <a id="backLink" class="back-link" href="subcription.html">Back to library</a>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h3>Pages</h3>
      <ul id="pageList" class="page-list"></ul>
    </aside>

    <main class="main">
      <section class="viewer-head">
        <div>
          <div class="viewer-title">Math Champion Sec 3</div>
          <div class="viewer-sub">Image-based e-textbook viewer</div>
        </div>
        <div id="pageLabel" class="page-label">Loading...</div>
      </section>

      <section class="viewer-canvas-wrap" id="canvasWrap">
        <div id="status" class="status">Loading PDF pages...</div>
        <img id="pageImage" alt="Workbook page" />
      </section>

      <section id="answerPanel" class="qa-panel" hidden>
        <div class="qa-head">
          <div class="qa-title">Answer Inputs</div>
          <div id="qaContext" class="qa-context"></div>
        </div>
        <div id="qaFields" class="qa-fields"></div>
      </section>

      <section class="controls">
        <button id="prevBtn" class="btn">Previous Page</button>
        <button id="checkBtn" class="btn check" hidden>Check Answer</button>
        <button id="nextBtn" class="btn primary">Next Page</button>
      </section>
    </main>
  </div>

  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.6.82/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.6.82/pdf.worker.min.mjs';

    const pdfPath = 'assets/sec-2-math-example.pdf';
    const firstVisiblePdfPage = 2; // Remove the first PDF page from the viewer.

    const backLink = document.getElementById('backLink');
    const params = new URLSearchParams(window.location.search);
    const from = params.get('from');
    if (from && /^[a-zA-Z0-9._-]+\.html(?:\?.*)?$/.test(from)) {
      backLink.href = from;
    }

    const pageList = document.getElementById('pageList');
    const pageLabel = document.getElementById('pageLabel');
    const statusEl = document.getElementById('status');
    const imageEl = document.getElementById('pageImage');
    const wrapEl = document.getElementById('canvasWrap');
    const answerPanel = document.getElementById('answerPanel');
    const qaContext = document.getElementById('qaContext');
    const qaFields = document.getElementById('qaFields');
    const prevBtn = document.getElementById('prevBtn');
    const checkBtn = document.getElementById('checkBtn');
    const nextBtn = document.getElementById('nextBtn');

    const ANSWER_STORAGE_KEY = 'mathViewerAnswerInputs';
    const HARDCODED_FIELDS_BY_PDF_PAGE = {
      3: [
        { id: 'q1a', label: 'Q1a' },
        { id: 'q1b', label: 'Q1b' },
        { id: 'q2', label: 'Q2' }
      ],
      4: [
        { id: 'q3a', label: 'Q3a' },
        { id: 'q3b', label: 'Q3b' },
        { id: 'q4', label: 'Q4' }
      ],
      5: [
        { id: 'q5', label: 'Q5' },
        { id: 'q6', label: 'Q6' }
      ],
      6: [
        { id: 'q7a', label: 'Q7a' },
        { id: 'q7b', label: 'Q7b' },
        { id: 'q8a', label: 'Q8a' },
        { id: 'q8b', label: 'Q8b' }
      ],
      7: [
        { id: 'q9ai', label: 'Q9a(i)' },
        { id: 'q9aii', label: 'Q9a(ii)' },
        { id: 'q9b', label: 'Q9b' },
        { id: 'q10', label: 'Q10' }
      ],
      8: [
        { id: 'q11a', label: 'Q11a' },
        { id: 'q11b', label: 'Q11b' },
        { id: 'q12a', label: 'Q12a' },
        { id: 'q12b', label: 'Q12b' }
      ],
      9: [
        { id: 'q13a', label: 'Q13a' },
        { id: 'q13b', label: 'Q13b' }
      ],
      10: [
        { id: 'q14a', label: 'Q14a' },
        { id: 'q14b', label: 'Q14b' },
        { id: 'q14c', label: 'Q14c' }
      ],
      11: [
        { id: 'q15a', label: 'Q15a' },
        { id: 'q15b', label: 'Q15b' },
        { id: 'q16a', label: 'Q16a' },
        { id: 'q16b', label: 'Q16b' }
      ],
      12: [
        { id: 'q17a', label: 'Q17a' },
        { id: 'q17b', label: 'Q17b' }
      ],
      13: [
        { id: 'q18a', label: 'Q18a' },
        { id: 'q18bi', label: 'Q18b(i)' },
        { id: 'q18bii', label: 'Q18b(ii)' }
      ],
      14: [
        { id: 'q19a', label: 'Q19a' },
        { id: 'q19b', label: 'Q19b' },
        { id: 'q19c', label: 'Q19c' }
      ],
      15: [
        { id: 'q20a', label: 'Q20a' },
        { id: 'q20b', label: 'Q20b' },
        { id: 'q20c', label: 'Q20c' }
      ],
      16: [
        { id: 'q21a', label: 'Q21a' },
        { id: 'q21b', label: 'Q21b' }
      ],
      17: [
        { id: 'q21c', label: 'Q21c' }
      ],
      18: [
        { id: 'q22a', label: 'Q22a' },
        { id: 'q22b', label: 'Q22b' }
      ],
      19: [
        { id: 'q22c', label: 'Q22c' }
      ],
      20: [
        { id: 'q23ai', label: 'Q23a(i)' },
        { id: 'q23aii', label: 'Q23a(ii)' },
        { id: 'q23b', label: 'Q23b' }
      ]
    };

    function loadAnswers() {
      try {
        const parsed = JSON.parse(localStorage.getItem(ANSWER_STORAGE_KEY) || '{}');
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch {
        return {};
      }
    }

    const storedAnswers = loadAnswers();

    let pdfDoc = null;
    let currentPdfPage = firstVisiblePdfPage;

    function visibleIndex(pdfPage) {
      return pdfPage - firstVisiblePdfPage + 1;
    }

    function totalVisiblePages() {
      return Math.max(0, (pdfDoc?.numPages || 0) - 1);
    }

    function answerKey(pdfPage, fieldId) {
      return `pdf${pdfPage}_${fieldId}`;
    }

    function saveAnswers() {
      localStorage.setItem(ANSWER_STORAGE_KEY, JSON.stringify(storedAnswers));
    }

    function getHardcodedFieldsForCurrentPage() {
      return HARDCODED_FIELDS_BY_PDF_PAGE[currentPdfPage] || [];
    }

    function renderAnswerInputs() {
      const visiblePage = visibleIndex(currentPdfPage);

      if (visiblePage === 1) {
        answerPanel.hidden = true;
        qaFields.innerHTML = '';
        qaContext.textContent = '';
        return;
      }

      const fields = getHardcodedFieldsForCurrentPage();

      qaFields.innerHTML = '';
      if (!fields.length) {
        answerPanel.hidden = true;
        qaContext.textContent = '';
        return;
      }

      answerPanel.hidden = false;
      qaContext.textContent = `Viewer page ${visiblePage}`;

      fields.forEach((field) => {
        const key = answerKey(currentPdfPage, field.id);

        const label = document.createElement('label');
        label.className = 'qa-item';

        const text = document.createElement('span');
        text.textContent = field.label;

        const input = document.createElement('input');
        input.type = 'text';
        input.autocomplete = 'off';
        input.placeholder = 'Type answer';
        input.value = storedAnswers[key] || '';
        input.addEventListener('input', () => {
          storedAnswers[key] = input.value;
          saveAnswers();
        });

        label.appendChild(text);
        label.appendChild(input);
        qaFields.appendChild(label);
      });
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
      statusEl.style.display = 'block';
      imageEl.style.display = 'none';
    }

    function setReady() {
      statusEl.style.display = 'none';
      imageEl.style.display = 'block';
    }

    function buildPageList() {
      pageList.innerHTML = '';
      for (let p = firstVisiblePdfPage; p <= pdfDoc.numPages; p += 1) {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.dataset.pdfPage = String(p);
        btn.textContent = `Page ${visibleIndex(p)}`;
        btn.addEventListener('click', () => {
          currentPdfPage = p;
          renderCurrentPage();
        });
        li.appendChild(btn);
        pageList.appendChild(li);
      }
    }

    function updateControls() {
      pageLabel.textContent = `Page ${visibleIndex(currentPdfPage)} of ${totalVisiblePages()}`;
      prevBtn.disabled = currentPdfPage <= firstVisiblePdfPage;
      nextBtn.disabled = currentPdfPage >= pdfDoc.numPages;
      checkBtn.hidden = currentPdfPage !== pdfDoc.numPages;

      renderAnswerInputs();

      document.querySelectorAll('#pageList button').forEach((btn) => {
        btn.classList.toggle('active', Number(btn.dataset.pdfPage) === currentPdfPage);
      });
    }

    async function renderCurrentPage() {
      if (!pdfDoc) return;
      setStatus('Rendering page...');
      updateControls();

      const page = await pdfDoc.getPage(currentPdfPage);
      const baseViewport = page.getViewport({ scale: 1 });
      const targetWidth = Math.max(wrapEl.clientWidth - 20, 280);
      const targetHeight = Math.max(wrapEl.clientHeight - 20, 280);
      const widthScale = targetWidth / baseViewport.width;
      const heightScale = targetHeight / baseViewport.height;
      const scale = Math.min(widthScale, heightScale);
      const viewport = page.getViewport({ scale });

      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d', { alpha: false });
      canvas.width = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);

      await page.render({ canvasContext: context, viewport }).promise;
      imageEl.src = canvas.toDataURL('image/png');
      imageEl.alt = `Workbook page ${visibleIndex(currentPdfPage)}`;

      setReady();
      updateControls();
    }

    prevBtn.addEventListener('click', () => {
      if (currentPdfPage > firstVisiblePdfPage) {
        currentPdfPage -= 1;
        renderCurrentPage();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (pdfDoc && currentPdfPage < pdfDoc.numPages) {
        currentPdfPage += 1;
        renderCurrentPage();
      }
    });

    checkBtn.addEventListener('click', () => {
      const requiredFields = Object.entries(HARDCODED_FIELDS_BY_PDF_PAGE).flatMap(([pdfPage, fields]) => {
        const pageNum = Number(pdfPage);
        return fields.map((field) => ({
          key: answerKey(pageNum, field.id),
          label: `Page ${visibleIndex(pageNum)} - ${field.label}`
        }));
      });

      const missing = requiredFields.filter((field) => {
        const value = storedAnswers[field.key] || '';
        return !value.trim();
      });

      if (missing.length > 0) {
        const preview = missing
          .slice(0, 8)
          .map((field) => `- ${field.label}`)
          .join('\n');
        const more = missing.length > 8 ? '\n- ...' : '';
        alert(`You still have ${missing.length} unanswered item(s).\n\n${preview}${more}`);
        return;
      }

      alert('All answer fields are filled.');
    });

    window.addEventListener('resize', () => {
      if (pdfDoc) renderCurrentPage();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') prevBtn.click();
      if (e.key === 'ArrowRight') nextBtn.click();
    });

    async function init() {
      try {
        setStatus('Loading PDF pages...');
        const task = pdfjsLib.getDocument(pdfPath);
        pdfDoc = await task.promise;

        if (pdfDoc.numPages < firstVisiblePdfPage) {
          setStatus('PDF does not contain enough pages to hide page 1.');
          return;
        }

        buildPageList();
        currentPdfPage = firstVisiblePdfPage;
        await renderCurrentPage();
      } catch (err) {
        console.error(err);
        setStatus('Unable to load PDF. Please check assets/sec-2-math-example.pdf exists and refresh.');
      }
    }

    init();
  </script>
</body>
</html>
